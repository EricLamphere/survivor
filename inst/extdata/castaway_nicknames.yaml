# Castaway Nickname Mappings for Image Lookups
#
# This file maps castaway names (as they appear in the database) to their
# show nicknames used in Fandom wiki image filenames.
#
# Format:
#   castaway_name:
#     default: nickname  # Used for all seasons unless overridden
#     season_X: nickname # Season-specific override
#
# Examples:
# - "Oscar Lusth" is known as "ozzy" in all seasons
# - "Rob Mariano" has different image files across seasons

# Global nicknames (apply to all seasons unless overridden)
